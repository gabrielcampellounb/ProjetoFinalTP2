{% extends "base.html" %}

{% block title %}Cadastrar produto | Gerência de Compras{% endblock %}

{% block content %}
  <h1>Cadastrar produto</h1>
  <form method="post" action="{{ url_for('html.new_product_page') }}">
    <label for="name">Nome</label>
    <input id="name" name="name" required>

    <label for="brand">Marca</label>
    <input id="brand" name="brand" required>

    <label for="price">Preço base</label>
    <input id="price" name="price" type="number" min="0" step="0.01" required>

    <label for="bar_code">Código de barras</label>
    <input id="bar_code" name="bar_code" minlength="13" maxlength="13" required>

    <label for="quantity">Quantidade</label>
    <input id="quantity" name="quantity" type="number" min="0" step="1" required>

    <button type="submit">Cadastrar</button>
  </form>
{% endblock %}
